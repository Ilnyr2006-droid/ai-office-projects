name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    paths:
      - "ai-office/ai_office_app.py"
      - "ai-office/ai_office_desktop.py"
      - "ai-office/build_exe.bat"
      - ".github/workflows/build-windows-exe.yml"

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller pywebview

      - name: Build EXE
        working-directory: ai-office
        run: |
          pyinstaller --noconfirm --onefile --windowed --name AIOffice ai_office_desktop.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AIOffice-windows-exe
          path: ai-office/dist/AIOffice.exe
